<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Library</title>
  </head>
  <body>
    <h1>My Library</h1>
    {% if not all_books %}
      <p>There are no books.</p>
    {%endif%}
    <ul>
<!--      <li>{{books}}</li>-->
      {% for book in books %}

      <li><a href="{{url_for('delete', id= book.id)}}">Delete Book</a> {{book.title}} - {{book.author}} - {{book.rating}} /10 <a href="{{url_for('edit', id= book.id)}}">Update Rating</a></li>

      {%endfor%}
    </ul>

    <a href="{{url_for('add')}}">Add New Book</a>
  </body>
</html>
