<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Add Book</title>
</head>
<body>
<form action="{{ url_for('add') }}" method="POST">
    <label for="name">Book Name</label>
    <input
            id="name"
            name="name"

            type="text"/>
    <label for="author">Book Author</label>
    <input
            id="author"
            name="author"
            type="text"/>
    <label for="rating">Rating</label>
    <input
            id="rating"
            name="rating"
            type="text"

    />
    <button type="submit">Add Book</button>
</form>
</body>
</html>
